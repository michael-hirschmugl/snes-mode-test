MEMORY {
    ZP:      start = $000000, size = $000100, type = rw, define = yes;
    RAM:     start = $000200, size = $001E00, type = rw, define = yes;
    ROM:     start = $008000, size = $007FC0, type = ro, file = %O, fill = yes, fillval = $FF;
    HEADER:  start = $007FC0, size = $0020,  type = ro, file = %O, fill = yes, fillval = $FF;
    VECTORS: start = $007FE0, size = $0020,  type = ro, file = %O, fill = yes, fillval = $FF;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp;
    BSS:      load = RAM,     type = bss, define = yes;
    CODE:     load = ROM,     type = ro;
    RODATA:   load = ROM,     type = ro;
    HEADER:   load = HEADER,  type = ro;
    VECTORS:  load = VECTORS, type = ro;
}
